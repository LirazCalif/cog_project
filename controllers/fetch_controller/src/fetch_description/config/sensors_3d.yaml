sensors:
  - default_sensor
default_sensor:
  filtered_cloud_topic: /head_camera/depth/points_filtered
  max_range: 5.0
  max_update_rate: 30
  padding_offset: 0.02
  padding_scale: 1.0
  point_cloud_topic: /head_camera/depth/points
  point_subsample: 1
  sensor_plugin: occupancy_map_monitor/PointCloudOctomapUpdater